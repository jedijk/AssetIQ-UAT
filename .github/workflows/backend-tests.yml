name: Backend Tests

on:
  push:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"
  pull_request:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Platform standards gate (WS8)
        run: |
          cd backend && python scripts/verify_platform_standards.py

      - name: AI entry point gate
        run: |
          cd backend && python scripts/ai_entry_point_report.py

      - name: Tenant isolation unit tests
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
        run: |
          cd backend && python -m pytest tests/test_tenant_isolation_audit_waves.py tests/test_strict_mode_cutover.py -q

      - name: Route auth inventory (informational)
        continue-on-error: true
        run: |
          cd backend && python scripts/route_auth_inventory.py --public-only > /tmp/public_routes.txt
          cat /tmp/public_routes.txt

      - name: Bootstrap CI test users
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
          ENVIRONMENT: test
          JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
        run: |
          cd backend
          python scripts/ci_bootstrap_test_users.py
          python scripts/ci_integration_bootstrap.py

      - name: Graph coverage report
        run: |
          cd backend && python scripts/graph_coverage_report.py

      - name: Start API server for integration tests
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
          ENVIRONMENT: test
          JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
          RATE_LIMIT_ENABLED: "false"
          VAPID_PUBLIC_KEY: test-public-key
          VAPID_PRIVATE_KEY: test-private-key
        run: |
          cd backend
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8765 > /tmp/uvicorn-ci.log 2>&1 &
          echo $! > /tmp/uvicorn-ci.pid
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:8765/health > /dev/null; then
              echo "API ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          tail -n 80 /tmp/uvicorn-ci.log || true
          exit 1

      - name: Run full backend test suite
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
          ENVIRONMENT: test
          JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
          RATE_LIMIT_ENABLED: "false"
          VAPID_PUBLIC_KEY: test-public-key
          VAPID_PRIVATE_KEY: test-private-key
          REACT_APP_BACKEND_URL: http://127.0.0.1:8765
        run: |
          cd backend && python -m pytest tests/ -q --cov=services --cov=repositories --cov-report=term-missing:skip-covered --cov-fail-under=0

      - name: Strict mode cutover check (informational)
        continue-on-error: true
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
        run: |
          cd backend && python scripts/strict_mode_cutover_check.py

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/uvicorn-ci.pid ]; then
            kill "$(cat /tmp/uvicorn-ci.pid)" 2>/dev/null || true
          fi

      - name: Run UAT readiness gates
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
          ENVIRONMENT: test
          REACT_APP_BACKEND_URL: http://127.0.0.1:8765
        run: |
          cd backend && python scripts/verify_uat_gates.py

      - name: Test summary
        if: always()
        run: |
          echo "Backend tests executed from backend/tests/ (full suite)"
