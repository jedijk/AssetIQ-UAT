name: Backend Tests

on:
  push:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"
  pull_request:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        env:
          MONGO_URL: mongodb://localhost:27017/test
        run: |
          cd backend && python -m pytest \
            tests/test_background_jobs.py \
            tests/test_maintenance_readiness.py \
            tests/test_verify_uat_gates.py \
            tests/test_pm_import_job_handler.py \
            tests/test_reliability_graph_pm_import.py \
            tests/test_worker_config.py \
            tests/test_ai_cost_guard.py \
            -q
