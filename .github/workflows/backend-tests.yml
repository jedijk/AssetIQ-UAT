name: Backend Tests

on:
  push:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"
  pull_request:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run full backend test suite
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
        run: |
          cd backend && python -m pytest tests/ -q --ignore=tests/test_big_bag_dashboard_filter.py --cov=services --cov=repositories --cov-report=term-missing:skip-covered --cov-fail-under=0

      - name: Run UAT readiness gates
        env:
          MONGO_URL: mongodb://localhost:27017/test
          DB_NAME: test
        run: |
          cd backend && python scripts/verify_uat_gates.py

      - name: Test summary
        if: always()
        run: |
          echo "Backend tests executed from backend/tests/ (full suite)"
