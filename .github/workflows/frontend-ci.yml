name: Frontend CI

on:
  push:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"
  pull_request:
    branches:
      - main
      - deploy-uat
      - deploy-uat-push
      - "uat/**"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Banned import checks
        run: bash ../scripts/check_frontend_imports.sh

      - name: Production build
        env:
          CI: "true"
          GENERATE_SOURCEMAP: "false"
        run: npm run build
