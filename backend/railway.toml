# API service only. For the background worker sidecar, see ../railway.worker.toml
# and docs/stabilization/EXTERNAL_WORKER_DEPLOY.md.
# Set USE_EXTERNAL_BACKGROUND_WORKER=true on this service in UAT/production.

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
