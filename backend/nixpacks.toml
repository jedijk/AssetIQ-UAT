# Pin Python for Railway/Nixpacks (mirrors runtime.txt and CI).
[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

# Keep the default install phase (venv + requirements.txt). Add audit tooling after.
[phases.audit-tools]
dependsOn = ["install"]
cmds = [". /opt/venv/bin/activate && pip install -r requirements-audit.txt"]
