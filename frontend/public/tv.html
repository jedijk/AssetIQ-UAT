<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta name="theme-color" content="#020617" />
        <title>AssetIQ Display</title>
        <script src="%PUBLIC_URL%/tv-detect.js"></script>
        <link rel="stylesheet" href="%PUBLIC_URL%/kiosk-compat.css" />
        <style>
            html,
            body,
            #root {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #020617;
            }
            #root:empty::before {
                content: "Loading display…";
                display: flex;
                min-height: 100vh;
                align-items: center;
                justify-content: center;
                background: #020617;
                color: #94a3b8;
                font: 500 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }
        </style>
    </head>
    <body>
        <noscript>Enable JavaScript to use the AssetIQ display.</noscript>
        <div id="root"></div>
    </body>
</html>
